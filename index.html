<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mind in Motion — An Atmospheric Odyssey</title>

<meta name="description" content="An atmospheric cinematic platformer engineered by Bruder Motion. Run, leap, and transcend the static.">
<meta property="og:title" content="Mind in Motion">
<meta property="og:description" content="Experience the platformer portfolio showcase by Bruder Motion. Built from raw code to high design.">
<meta property="og:image" content="https://itsultium.github.io/mind-in-motion/og_preview.jpg">
<meta property="og:url" content="https://itsultium.github.io/mind-in-motion/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Mind in Motion">
<meta name="twitter:description" content="A portfolio piece in motion. Explore seven chapters of psychological architectural landscapes.">
<meta name="twitter:image" content="https://itsultium.github.io/mind-in-motion/og_preview.jpg">

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon_180.png">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #05090f; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
  
  /* Cinematic Intro Video Overlay Container */
  #intro-container {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: 999; background: #05090f; transition: opacity 1.2s ease-in-out;
    pointer-events: none; opacity: 0;
  }
  #intro-container.active { pointer-events: auto; opacity: 1; }
  #intro-video { width: 100%; height: 100%; object-fit: cover; }
  
  .skip-prompt {
    position: absolute; bottom: 30px; right: 30px; color: #9db8e0;
    font: 11px Georgia, serif; letter-spacing: 2px; opacity: 0.4;
    animation: pulseText 2s infinite ease-in-out; pointer-events: none;
  }

  /* Artistic Main Menu System Overlay */
  #gatekeeper {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #05090f; z-index: 1000; display: flex; flex-direction: column;
    align-items: center; justify-content: center; transition: opacity 0.6s ease-in-out;
    user-select: none; -webkit-user-select: none;
  }
  #gatekeeper h1 {
    color: #dfe8f5; font: 32px Georgia, serif; letter-spacing: 8px;
    margin-bottom: 40px; opacity: 0.9; text-shadow: 0 0 20px rgba(157,184,224,0.15);
  }
  .menu-layout { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  
  .menu-btn {
    background: transparent; border: 1px solid rgba(157,184,224,0.25); color: #dfe8f5;
    font: 11px Georgia, serif; letter-spacing: 3px; padding: 14px 34px; min-width: 200px;
    cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); text-align: center;
  }
  .menu-btn:hover {
    background: rgba(157,184,224,0.12); border-color: rgba(157,184,224,0.6);
    box-shadow: 0 0 15px rgba(157,184,224,0.1);
  }
  
  #level-select-panel {
    margin-top: 40px; display: flex; flex-direction: column; align-items: center; opacity: 0;
    transition: opacity 0.5s ease;
  }
  #level-select-panel p {
    color: #9db8e0; font: 9px Georgia, serif; letter-spacing: 4px; margin-bottom: 14px; opacity: 0.5;
  }
  .nodes-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 450px; }
  
  .node-btn {
    background: transparent; border: 1px solid rgba(157,184,224,0.15); color: #9db8e0;
    font: 11px Georgia, serif; padding: 8px 16px; cursor: pointer; transition: all 0.2s;
  }
  .node-btn:hover {
    background: rgba(157,184,224,0.2); color: #dfe8f5; border-color: rgba(157,184,224,0.5);
  }

  #hud {
    position: fixed; top: 10px; left: 12px; color: #9db8e0; opacity: 0.6;
    font: 12px/1.4 Georgia, serif; letter-spacing: 1px; pointer-events: none;
    user-select: none; z-index: 5;
  }
  .btn {
    position: fixed; bottom: 24px; width: 64px; height: 64px; border-radius: 50%;
    background: rgba(157,184,224,0.12); border: 1px solid rgba(157,184,224,0.3);
    color: #9db8e0; font-size: 24px; display: none; align-items: center;
    justify-content: center; user-select: none; -webkit-user-select: none; z-index: 5;
  }
  .btn:active { background: rgba(157,184,224,0.28); }
  #btnL { left: 20px; }
  #btnR { left: 100px; }
  #btnJ { right: 24px; width: 76px; height: 76px; }
  
  @keyframes pulseText {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.6; }
  }
  @media (pointer: coarse) { .btn { display: flex; } }
</style>
</head>
<body>

<div id="gatekeeper">
  <h1>MIND IN MOTION</h1>
  <div class="menu-layout">
    <button class="menu-btn" id="menu-new-btn">NEW JOURNEY</button>
    <button class="menu-btn" id="menu-cont-btn" style="display: none;">CONTINUE</button>
  </div>
  <div id="level-select-panel">
    <p>SELECT UNLOCKED CHAPTER</p>
    <div class="nodes-row" id="nodes-container"></div>
  </div>
</div>

<div id="intro-container">
  <video id="intro-video" src="https://res.cloudinary.com/dcjst7sod/video/upload/v1781299675/Story_0_xbmfds.mp4" playsinline preload="auto"></video>
  <div class="skip-prompt">TAP ANYWHERE TO SKIP</div>
</div>

<canvas id="c"></canvas>
<div id="hud">ARROWS / WASD &nbsp;·&nbsp; SPACE TO JUMP &nbsp;·&nbsp; R RESTART · M MUTE</div>
<div class="btn" id="btnL">&#9664;</div>
<div class="btn" id="btnR">&#9654;</div>
<div class="btn" id="btnJ">&#9650;</div>

<script src="levels.js"></script>
<script src="game.js"></script>
</body>
</html>
